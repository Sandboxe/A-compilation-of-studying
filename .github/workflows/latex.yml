name: Build All LaTeX
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile all LaTeX files
        uses: xu-cheng/latex-action@v3
        with:
          # This pattern finds all .tex files but skips main.tex
          root_file: |
            *.tex
            !main.tex
          glob_root_file: true

      - name: Upload all PDFs
        uses: actions/upload-artifact@v4
        with:
          name: All-Compiled-PDFs
          # This collects every .pdf file created in the build
          path: "*.pdf"

