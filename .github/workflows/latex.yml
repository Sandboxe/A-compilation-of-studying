name: Build and Save PDFs
on: [push]

# This part is NEW: it gives the bot permission to save the PDFs to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile all LaTeX files
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "*.tex"

      # This part is NEW: it saves the PDFs into your actual folder
      - name: Save PDFs back to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add *.pdf
          git commit -m "Update rendered PDFs" || echo "No changes to commit"
          git push
